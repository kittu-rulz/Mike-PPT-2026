<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">

<body class="deep-scroll brilliant-direction">
  <div class="site-shell">
    <div class="ambient ambient--a" aria-hidden="true"></div>
    <div class="ambient ambient--b" aria-hidden="true"></div>
    <div class="ambient-grid" aria-hidden="true"></div>

    <div class="progress-line" aria-hidden="true">
      <span class="progress-line__bar" id="progress-bar"></span>
    </div>

    <header class="site-chrome">
      <a class="site-mark" href="#opening">
        <span class="site-mark__logo" aria-hidden="true">
          <img src="assets/media/aptara-logo.svg" alt="">
        </span>
        <span class="site-mark__eyebrow">ENT Digital Presentation</span>
        <span class="site-mark__label" id="current-section-label">Opening</span>
      </a>

      <button
        class="toc-toggle"
        type="button"
        data-toc-toggle
        aria-expanded="false"
        aria-controls="toc-panel"
      >
        <span class="toc-toggle__icon" aria-hidden="true">
          <span></span>
          <span></span>

          <div>

          </button>
        </div>
        <nav class="toc-panel__body" id="toc-body"></nav>
      </div>
    </aside>

    <button class="back-to-top" type="button" data-back-to-top aria-label="Back to top">
      <span class="back-to-top__icon" aria-hidden="true">↑</span>
      <span class="visually-hidden">Back to Top</span>
    </button>

    <main class="narrative" id="presentation"></main>
    <div class="visually-hidden" aria-live="polite" id="live-region"></div>
  </div>
