<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENT: FY&rsquo;26 Performance &amp; FY&rsquo;27 Growth Strategy</title>
  
  <!-- Web Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">
</head>

<body class="deep-scroll brilliant-direction">
  <a class="skip-link" href="#presentation">Skip to main content</a>

  <!-- Visual Background Elements -->
  <div class="ambient ambient--a" aria-hidden="true"></div>
  <div class="ambient ambient--b" aria-hidden="true"></div>
  <div class="ambient-grid" aria-hidden="true"></div>

  <!-- Mast Navigation -->
  <header class="site-header" role="banner">
    <a class="site-identity" href="#opening" aria-label="Go to opening">
      <span class="site-identity__logo" aria-hidden="true">
        <img src="assets/media/aptara-logo.svg" alt="">
      </span>
      <div class="site-identity__text">
        <span class="site-identity__subtitle">ENT Digital Presentation</span>
        <span class="site-identity__current" id="current-section-label">Opening</span>
      </div>
    </a>

    <button
      class="chapters-toggle"
      type="button"
      data-toc-toggle
      aria-expanded="false"
      aria-controls="toc-panel"
    >
      <span class="chapters-toggle__icon" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
      <span>Chapters</span>
    </button>
  </header>

  <!-- Chapter Navigation Overlay -->
  <button class="chapters-scrim" id="chapters-scrim" aria-label="Close chapters" hidden></button>

  <nav class="chapters-panel" id="toc-panel" aria-hidden="true" aria-labelledby="chapters-title">
    <div class="chapters-panel__inner">
      <div class="chapters-panel__header">
        <div>
          <h2 class="chapters-panel__title" id="chapters-title">Jump to a chapter</h2>
        </div>
        <button class="chapters-close" type="button" data-toc-close aria-label="Close chapters">
          <span aria-hidden="true">✕</span>
        </button>
      </div>
      <ol class="chapters-list" id="toc-body" aria-label="Chapter links"></ol>
    </div>
  </nav>

  <!-- Scroll Progress Indicator -->
  <div class="progress-line" aria-hidden="true">
    <span class="progress-line__bar" id="progress-bar"></span>
  </div>

  <!-- Main Presentation Content -->
  <main class="presentation" id="presentation" role="main">
    <!-- Chapters inserted here dynamically -->
  </main>

  <button class="back-to-top" type="button" data-back-to-top aria-label="Back to top">
    <span class="back-to-top__icon" aria-hidden="true">↑</span>
  </button>

  <!-- Live Region for Screen Readers -->
  <div class="visually-hidden" aria-live="polite" aria-atomic="true" id="live-region"></div>

  <!-- Scripts -->
  <script src="assets/vendor/echarts.min.js"></script>
  <script src="deck-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
